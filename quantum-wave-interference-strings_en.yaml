                 A broad central peak, tapering toward the edges.
    zoomButtonGroup:
      zoomInAccessibleHelpText:  Zoom in to see more detail of detector screen pattern.
      zoomOutAccessibleHelpText: Zoom out to see more of detector screen pattern.
  detectorScreenButtons:
    clearScreen:
      accessibleName:            Clear Hits
      accessibleHelpText:        Clear hits pattern on detector screen.
      accessibleContextResponse: >-
                                 { $isEmitting ->
                                   [true] { $isPlaying ->
                                     [true] Hits pattern cleared. Hits detection restarted. Individual hits increasing
                                     on detector screen.
                                    *[false] Hits pattern cleared. Sim paused.
                                   }
                                  *[false] Hits pattern cleared. Screen empty.
                                 }
    takeSnapshot:
      accessibleName:            Take Snapshot
      accessibleHelpText:        |-
                                 { $snapshotCount ->
                                   [0] Capture and store up to { $maxSnapshots } snapshots of detector screen pattern.
                                   [1] One snapshot stored. Capture and store up to { $maxSnapshots } snapshots of detector screen pattern.
                                   [2] Two snapshots stored. Capture and store up to { $maxSnapshots } snapshots of detector screen pattern.
                                   [3] Three snapshots stored. Capture and store up to { $maxSnapshots } snapshots of detector screen pattern.
                                   [4] Four snapshots stored. Capture and store up to { $maxSnapshots } snapshots of detector screen pattern.
                                  *[other] { $snapshotCount } snapshots stored. Capture and store up to { $maxSnapshots } snapshots of detector screen pattern.
                                 }
      accessibleContextResponse: >-
                                 { $snapshotCount ->
                                   [4] Max number of snapshots stored. View snapshots to review or delete.
                                  *[other] Detector screen snapshot stored.
                                 }
    viewSnapshots:
      accessibleName:            View Snapshots
      accessibleHelpText:        Open stored snapshots for comparison or deletion.
      accessibleContextResponse: |-
                                 { $snapshotCount ->
                                   [one] 1 snapshot ready to review.
                                  *[other] { $snapshotCount } snapshots ready to review.
                                 }
