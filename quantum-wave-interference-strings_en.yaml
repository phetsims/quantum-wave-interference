# Accessibility strings
a11y:
  screenSummary:
    playArea: >-
      In a double-slit experiment, a { $sourceType ->
        [photons] photon source
        [electrons] electron source
        [neutrons] neutron source
       *[heliumAtoms] helium atom source
      } emits { $sourceType ->
        [photons] photons
        [electrons] electrons
        [neutrons] neutrons
       *[heliumAtoms] helium atoms
      } toward a barrier with two narrow slits.
      { $sourceType ->
        [photons] Photons
        [electrons] Electrons
        [neutrons] Neutrons
       *[heliumAtoms] Helium atoms
      } that pass through the slits land on a detector screen, building up a pattern over time.
      A magnified view of the slits, a front-facing detector screen, and an intensity graph are shown.
    controlArea: >-
      Checkboxes show or hide a ruler and stopwatch.
      Play and pause controls and a Reset All button are available.
    currentDetails: >-
      Source is { $sourceType ->
        [photons] photons
        [electrons] electrons
        [neutrons] neutrons
       *[heliumAtoms] helium atoms
      }.
      Slit configuration is { $slitSetting ->
        [bothOpen] both open
        [leftCovered] left covered
        [rightCovered] right covered
        [leftDetector] left detector
       *[rightDetector] right detector
      }.
      Detection mode is { $detectionMode ->
        [averageIntensity] intensity
       *[hits] hits
      }.
      { $isEmitting ->
        [true] Source is on, { $totalHits } hits accumulated.
       *[false] Source is off.
      }
    interactionHint: >-
      { $isEmitting ->
        [true] Change particle type, adjust slit settings, or switch detection mode to explore the experiment.
       *[false] Turn on the { $sourceType ->
          [photons] photon source
          [electrons] electron source
          [neutrons] neutron source
         *[heliumAtoms] helium atom source
        } to start the experiment.
      }
  sourceHeading: Source
  slitsHeading: Slits
  detectorScreenHeading: Detector Screen
  graphHeading: Graph
  particleMass:
    accessibleParagraph: >-
      { $sourceType ->
        [electrons] Particle mass: 9.1 times 10 to the negative 31 kilograms.
        [neutrons] Particle mass: 1.7 times 10 to the negative 27 kilograms.
       *[heliumAtoms] Particle mass: 6.6 times 10 to the negative 27 kilograms.
      }
  emitterButton:
    accessibleName: >-
      { $sourceType ->
        [photons] Photon Source
        [electrons] Electron Source
        [neutrons] Neutron Source
       *[heliumAtoms] Helium Atom Source
      }
    accessibleHelpText: Turn the source on and off to start or stop the experiment.
  ruler:
    accessibleHelpText: Drag ruler up or down to align with features on the detector screen and graph.
  rulerCheckbox:
    accessibleHelpText: Show or hide a ruler to measure distances on the detector screen.
    accessibleContextResponseChecked: Ruler shown.
    accessibleContextResponseUnchecked: Ruler hidden.
  stopwatchCheckbox:
    accessibleHelpText: Show or hide a stopwatch to time the experiment.
    accessibleContextResponseChecked: Stopwatch shown.
    accessibleContextResponseUnchecked: Stopwatch hidden.
  slitSeparationSlider:
    accessibleHelpText: Adjust the distance between the centers of the two slits.
  screenDistanceSlider:
    accessibleHelpText: Adjust the distance from the barrier to the detector screen.
  intensitySlider:
    accessibleHelpText: >-
      Adjust how many { $sourceType ->
        [photons] photons
        [electrons] electrons
        [neutrons] neutrons
       *[heliumAtoms] helium atoms
      } the source emits per unit time.
  brightnessSlider:
    accessibleName: Screen Brightness
    accessibleHelpText: Adjust the brightness of the detector screen display.
  detectionModeRadioButtons:
    accessibleName: Detection Mode
    accessibleHelpText: Choose how detections are displayed on the detector screen.
    intensityRadioButton:
      accessibleContextResponse: Detector screen shows continuous intensity pattern.
    hitsRadioButton:
      accessibleContextResponse: Detector screen shows individual hits.
  sceneRadioButtonGroup:
    accessibleName: Particle Type
    accessibleHelpText: Choose a particle type to change the source used in the double-slit experiment.
    photonsRadioButton:
      accessibleContextResponse: Experiment now uses a photon source.
    electronsRadioButton:
      accessibleContextResponse: Experiment now uses an electron source.
    neutronsRadioButton:
      accessibleContextResponse: Experiment now uses a neutron source.
    heliumAtomsRadioButton:
      accessibleContextResponse: Experiment now uses a helium atom source.
  slitSettingsComboBox:
    accessibleName: Slit Configuration
    accessibleHelpText: Choose a slit configuration to change which slits are open, covered, or monitored by a detector.
    accessibleContextResponse: >-
      { $slitSetting ->
        [bothOpen] Both slits now open.
        [leftCovered] Left slit now covered.
        [rightCovered] Right slit now covered.
        [leftDetector] Left slit now monitored by a detector.
       *[rightDetector] Right slit now monitored by a detector.
      }
  slitView:
    accessibleParagraph: >-
      Magnified view of the barrier with two vertical slits, each { $slitWidth } wide.
      { $slitSetting ->
        [bothOpen] Both slits are open.
        [leftCovered] Left slit is covered.
        [rightCovered] Right slit is covered.
        [leftDetector] Left slit is monitored by a which-path detector.
       *[rightDetector] Right slit is monitored by a which-path detector.
      }
  graphAccordionBox:
    accessibleParagraph: >-
      { $detectionMode ->
        [averageIntensity] Graph shows a continuous intensity curve versus horizontal position on the detector screen. Peaks in the curve correspond to bright bands where detections are most likely.
       *[hits] Graph shows a histogram of accumulated hit counts versus horizontal position on the detector screen. Taller bars indicate positions where more detections have landed.
      }
    accessibleContextResponseExpanded: Graph expanded.
    accessibleContextResponseCollapsed: Graph collapsed.
  detectorScreen:
    accessibleParagraph: >-
      { $detectionMode ->
        [averageIntensity] { $isEmitting ->
          [true] Detector screen displays a continuous intensity pattern.
         *[false] Detector screen is blank.
        }
       *[hits] { $totalHits ->
          [0] Detector screen is blank with no hits recorded.
         *[other] Detector screen shows { $totalHits } accumulated hits.
        }
      }
  detectorScreenButtons:
    clearScreen:
      accessibleName: Clear Screen
      accessibleHelpText: Clear all hits from the detector screen.
      accessibleContextResponse: Screen cleared.
    takeSnapshot:
      accessibleName: Take Snapshot
      accessibleHelpText: Capture the current detector screen pattern as a snapshot.
    viewSnapshots:
      accessibleName: View Snapshots
      accessibleHelpText: Open a dialog to compare saved snapshots.
