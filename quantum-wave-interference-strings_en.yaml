# Accessibility strings
a11y:
  screenSummary:
    playArea:                >-
                             A highly configurable three-part experimental setup includes a particle source emitter,
                             double-slit barrier, and detector screen. When experiment is running, particles pass through
                             available slits in barrier to land on detector screen and form patterns. You can choose and
                             adjust source particles, configure slitted barrier, and observe and take snapshots of
                             resulting patterns on detector screen. Additionally, a graph of detector screen data can be
                             shown.
    playAreaHighIntensity:   >-
                             A zoomed-in wave area shows a particle source, double-slit barrier, and detector screen.
                             When the source is on, waves travel through available slits and build a pattern on the
                             detector screen. You can change particle type, slit configuration, wave display, detector
                             view, and measurement tools.
    playAreaSingleParticles: >-
                             A zoomed-in wave area shows a single-particle source, double-slit barrier, and detector
                             screen. When the source is on, individual particles travel through available slits and build
                             a hits pattern on the detector screen. You can change particle type, slit configuration,
                             wave display, detector view, and measurement tools.
    controlArea:             >-
                             Measurement tools can be added or removed to assist with data collection and analysis.
                             Reset sim to start over.
    maxHitsReachedHint:      Clear detector screen to make more observations.
    currentDetails:          >-
                             Currently, { $isPlaying ->
                               [false] sim is paused. { $isMaxHitsReached ->
                                 [true] Source is off. Max number of { $sourceType ->
                                   [photons] photon
                                   [electrons] electron
                                   [neutrons] neutron
                                  *[heliumAtoms] helium atom
                                 } hits reached. Detector screen shows hits pattern.
                                *[false] { $isEmitting ->
                                   [true] Source emits { $sourceType ->
                                     [photons] photons
                                     [electrons] electrons
                                     [neutrons] neutrons
                                   *[heliumAtoms] helium atoms
                                   } directly at double-slit barrier with { $slitSetting ->
                                     [bothOpen] both slits open
                                     [leftCovered] { $slitOrientation ->
                                       [topBottom] top slit covered
                                      *[leftRight] left slit covered
                                     }
                                     [rightCovered] { $slitOrientation ->
                                       [topBottom] bottom slit covered
                                      *[leftRight] right slit covered
                                     }
                                     [leftDetector] { $slitOrientation ->
                                       [topBottom] detector on top slit
                                      *[leftRight] detector on left slit
                                     }
                                     [rightDetector] { $slitOrientation ->
                                       [topBottom] detector on bottom slit
                                      *[leftRight] detector on right slit
                                     }
                                     [noBarrier] no barrier
                                    *[bothDetectors] detectors on both slits
                                   }. { $detectionMode ->
                                     [averageIntensity] { $hasHits ->
                                       [true] Detector screen shows intensity pattern.
                                      *[false] Detector screen is empty.
                                     }
                                    *[hits] { $hasHits ->
                                       [false] Detector screen has no hits.
                                      *[true] Detector screen shows hits pattern.
                                     }
                                   }
                                  *[false] Source is off. { $detectionMode ->
                                     [averageIntensity] Detector screen is empty.
                                    *[hits] { $hasHits ->
                                       [false] Detector screen is empty.
                                      *[true] Detector screen shows hits pattern.
                                     }
                                   }
                                 }
                               }
                              *[true] { $isMaxHitsReached ->
                                 [true] source is off. Max number of { $sourceType ->
                                   [photons] photon
                                   [electrons] electron
                                   [neutrons] neutron
                                  *[heliumAtoms] helium atom
                                 } hits reached. Detector screen shows hits pattern.
                                *[false] { $isEmitting ->
                                   [true] source emits { $sourceType ->
                                     [photons] photons
                                     [electrons] electrons
                                     [neutrons] neutrons
                                   *[heliumAtoms] helium atoms
                                   } directly at double-slit barrier with { $slitSetting ->
                                     [bothOpen] both slits open
                                     [leftCovered] { $slitOrientation ->
                                       [topBottom] top slit covered
                                      *[leftRight] left slit covered
                                     }
                                     [rightCovered] { $slitOrientation ->
                                       [topBottom] bottom slit covered
                                      *[leftRight] right slit covered
                                     }
                                     [leftDetector] { $slitOrientation ->
                                       [topBottom] detector on top slit
                                      *[leftRight] detector on left slit
                                     }
                                     [rightDetector] { $slitOrientation ->
                                       [topBottom] detector on bottom slit
                                      *[leftRight] detector on right slit
                                     }
                                     [noBarrier] no barrier
                                    *[bothDetectors] detectors on both slits
                                   }. { $detectionMode ->
                                     [averageIntensity] { $hasHits ->
                                       [true] Detector screen shows intensity pattern.
                                      *[false] Detector screen is empty.
                                     }
                                    *[hits] { $hasHits ->
                                       [false] Detector screen has no hits.
                                      *[true] Detector screen shows hits pattern.
                                     }
                                   }
                                  *[false] source is off. { $detectionMode ->
                                     [averageIntensity] Detector screen is empty.
                                    *[hits] { $hasHits ->
                                       [false] Detector screen is empty.
                                      *[true] Detector screen shows hits pattern.
                                     }
                                   }
                                 }
                               }
                             }
    interactionHint:         >-
                             { $isEmitting ->
                               [true] Adjust source or slits and watch for changes on detector screen.
                              *[false] Turn on { $sourceType ->
                                 [photons] photon
                                 [electrons] electron
                                 [neutrons] neutron
                                *[heliumAtoms] helium atom
                               } source and observe detector screen.
                             }
  snapshotNode:
    deleteSnapshotAccessibleName: 'Delete { $snapshotTitle }'
  sourceHeading:               Source Controls
  slitsHeading:                Slits and Screen Configuration
  detectorScreenHeading:       Detector Screen Controls
  experimentDetectorScreenDetails:
    detectorScreenAndExperimentDetailsHeading: Detector Screen and Experiment Details
    # Heading variant used on the High Intensity and Single Particles screens while the graph view is active.
    graphAndExperimentDetailsHeading:          Graph and Experiment Details
    # The sentence subject — detector screen or graph — selected by which view is active.
    displaySurface:            >-
                               { $surface ->
                                 [graph] Graph
                                *[detectorScreen] Detector screen
                               }
    # detectorScreenStatus 'emptyWavePropagating' means the screen is still empty but waves are traveling in the
    # wave area, so the "experiment ready" invitation would be wrong.
    leadingParagraph:          >-
                               { $detectorScreenStatus ->
                                 [empty] { a11y.experimentDetectorScreenDetails.displaySurface } is empty. { $sourceType ->
                                   [photons] Photon
                                   [electrons] Electron
                                   [neutrons] Neutron
                                  *[heliumAtoms] Helium atom
                                 } experiment ready.
                                 [emptyWavePropagating] { a11y.experimentDetectorScreenDetails.displaySurface } is empty.
                                *[pattern] { a11y.experimentDetectorScreenDetails.displaySurface } shows { $detectionMode ->
                                   [averageIntensity] an intensity pattern
                                  *[hits] a hits pattern
                                 } of a { $sourceType ->
                                   [photons] photon
                                   [electrons] electron
                                   [neutrons] neutron
                                  *[heliumAtoms] helium atom
                                 } experiment.
                               }
    experimentDetailsLeadingParagraph: 'Experiment details include:'
    heading:                    >-
                                Detector Screen, { $detectionMode ->
                                  [averageIntensity] Intensity Pattern
                                 *[hits] Hits Pattern
                                }
    experimentalDetailsHeading: Experimental Details
    sourceState:                >-
                                Source is { $isEmitting ->
                                  [true] on.
                                 *[false] off.
                                }
    totalHits:                  >-
                                { $isMaxHitsReached ->
                                  [true] Total hits is { $hitCount }. Maximum hits reached.
                                 *[false] Total hits is { $hitCount }.
                                }
    empty:                      Detector screen is empty.
  # Shared fragments composed into the source beam/packet descriptions on the High Intensity and Single Particles
  # screens. Each fragment resolves its { $variable } placeholders from the referencing message's format() arguments.
  sourceWaveFragments:
    lowercaseColor:           >-
                              { $sourceType ->
                                [photons] { $photonColor ->
                                  [violet] violet
                                  [blue] blue
                                  [indigo] indigo
                                  [green] green
                                  [yellow] yellow
                                  [orange] orange
                                 *[red] red
                                }
                               *[electrons] gray
                                [neutrons] gray
                                [heliumAtoms] gray
                              }
    capitalizedColorAndBlack: >-
                              { $sourceType ->
                                [photons] { $photonColor ->
                                  [violet] Violet
                                  [blue] Blue
                                  [indigo] Indigo
                                  [green] Green
                                  [yellow] Yellow
                                  [orange] Orange
                                 *[red] Red
                                } and black
                               *[electrons] Gray and black
                                [neutrons] Gray and black
                                [heliumAtoms] Gray and black
                              }
    slitTarget:               >-
                              { $slitSetting ->
                                [noBarrier] detector screen.
                               *[bothOpen] slitted barrier.
                                [leftCovered] slitted barrier.
                                [rightCovered] slitted barrier.
                                [leftDetector] slitted barrier.
                                [rightDetector] slitted barrier.
                                [bothDetectors] slitted barrier.
                              }
    wavePeakSpacing:          >-
                              { $wavefrontSpacing ->
                                [extremelyFarApart] Wave peaks, extremely far apart.
                                [veryFarApart] Wave peaks, very far apart.
                                [farApart] Wave peaks, far apart.
                                [somewhatCloseTogether] Wave peaks, somewhat close together.
                                [closeTogether] Wave peaks, close together.
                                [veryCloseTogether] Wave peaks, very close together.
                               *[extremelyCloseTogether] Wave peaks, extremely close together.
                              }
  singleParticlesState:
    # Single Particles counterpart to highIntensityState.sourceBeam: a single emitted wave packet rendered as a round
    # packet of waves, rather than a continuous beam of plane wave fronts.
    sourcePacket:             >-
                              { $waveDisplayMode ->
                                [amplitude] Round packet of solid { a11y.sourceWaveFragments.lowercaseColor } wave
                                moves toward { a11y.sourceWaveFragments.slitTarget }
                               *[electricField] Round packet of { a11y.sourceWaveFragments.lowercaseColor } and black
                                waves moves toward { a11y.sourceWaveFragments.slitTarget }
                                { a11y.sourceWaveFragments.wavePeakSpacing }
                                [realPart] Round packet of { a11y.sourceWaveFragments.lowercaseColor } and black
                                waves moves toward { a11y.sourceWaveFragments.slitTarget }
                                { a11y.sourceWaveFragments.wavePeakSpacing }
                                [imaginaryPart] Round packet of { a11y.sourceWaveFragments.lowercaseColor } and black
                                waves moves toward { a11y.sourceWaveFragments.slitTarget }
                                { a11y.sourceWaveFragments.wavePeakSpacing }
                              }
  highIntensityState:
    overview:             >-
                          Currently, { $isPlaying ->
                            [false] sim is paused.
                           *[true] sim is running.
                          } { $sourceType ->
                            [photons] photons
                            [electrons] electrons
                            [neutrons] neutrons
                           *[heliumAtoms] helium atoms
                          } { $isEmitting ->
                            [true] are being emitted
                           *[false] are not being emitted
                          }. { $displayMode ->
                            [graph] The graph is shown
                           *[screen] The detector screen is shown
                          } in { $detectionMode ->
                            [averageIntensity] Average Intensity mode.
                           *[hits] Hits mode.
                          }
    sourceStatus:         >-
                          Source is { $isEmitting ->
                            [true] on
                           *[false] off
                          }. Time is { $isPlaying ->
                            [true] running
                           *[false] paused
                          } at { $timeSpeed } speed.
    sourceBeam:           >-
                          { $isEmitting ->
                            [false] No beam is visible in the wave area.
                           *[true] { $waveDisplayMode ->
                              [amplitude] Solid { a11y.sourceWaveFragments.lowercaseColor } wave moves toward
                              { a11y.sourceWaveFragments.slitTarget }
                             *[electricField] { a11y.sourceWaveFragments.capitalizedColorAndBlack } plane wave fronts
                              move toward { a11y.sourceWaveFragments.slitTarget }
                              { a11y.sourceWaveFragments.wavePeakSpacing }
                              [realPart] { a11y.sourceWaveFragments.capitalizedColorAndBlack } plane wave fronts
                              move toward { a11y.sourceWaveFragments.slitTarget }
                              { a11y.sourceWaveFragments.wavePeakSpacing }
                              [imaginaryPart] { a11y.sourceWaveFragments.capitalizedColorAndBlack } plane wave fronts
                              move toward { a11y.sourceWaveFragments.slitTarget }
                              { a11y.sourceWaveFragments.wavePeakSpacing }
                            }
                          }
    photonDetail:         'Photon wavelength is { $wavelength }, in the { $color } zone.'
    particleDetail:       >-
                          { $sourceType ->
                            [electrons] Electron
                            [neutrons] Neutron
                           *[heliumAtoms] Helium atom
                          } speed is { $speed }. Effective matter wavelength is about { $wavelength }.
    slits:                >-
                          { $slitSetting ->
                            [bothOpen] Both slits are open. Slit separation is { $separation }.
                            [leftCovered] Top slit is covered. Wave fronts emerge from bottom slit only.
                            [rightCovered] Bottom slit is covered. Wave fronts emerge from top slit only.
                            [leftDetector] Top slit has a detector.
                            [rightDetector] Bottom slit has a detector.
                            [noBarrier] No barrier is between source and detector screen.
                           *[bothDetectors] Both slits have detectors.
                          }
    detectorPattern:      >-
                          { $isEmitting ->
                            [false] Source is off, so there is no pattern on the detector.
                           *[true] { $detectionMode ->
                              [averageIntensity] { $patternFormation ->
                                [empty] No pattern has reached the detector screen yet.
                                [forming] { $patternKind ->
                                  [doubleSlitInterference] Evenly-spaced bright bands form on detector screen.
                                  [singleSlitDiffraction] { $slitSetting ->
                                    [leftCovered] Wide bright area forms on lower part of detector screen.
                                   *[rightCovered] Wide bright area forms on upper part of detector screen.
                                  }
                                  [whichPathDiffraction] Wide bright area forms on detector screen.
                                 *[noBarrier] { $waveDisplayMode ->
                                    [amplitude] Solid wave forms uniform glow on detector screen.
                                   *[electricField] Plane wave fronts form uniform glow on detector screen.
                                    [realPart] Plane wave fronts form uniform glow on detector screen.
                                    [imaginaryPart] Plane wave fronts form uniform glow on detector screen.
                                  }
                                }
                                [complete] { $patternKind ->
                                  [doubleSlitInterference] Across detector screen bright bands are evenly spaced and { $bandSpacing ->
                                    [extremelyFarApart] extremely far apart
                                    [veryFarApart] very far apart
                                    [farApart] far apart
                                    [somewhatCloseTogether] somewhat close together
                                    [closeTogether] close together
                                    [veryCloseTogether] very close together
                                   *[extremelyCloseTogether] extremely close together
                                  }, brightest band at center.
                                  [singleSlitDiffraction] { $slitSetting ->
                                    [leftCovered] Across lower part of detector screen is a wide bright area fading toward edges,
                                    brightest part at center.
                                   *[rightCovered] Across upper part of detector screen is a wide bright area fading toward edges,
                                    brightest part at center.
                                  }
                                  [whichPathDiffraction] Across detector screen is a wide bright area fading toward edges,
                                  brightest part at center.
                                 *[noBarrier] Across detector screen is a uniform glow from edge to edge.
                                }
                                [paused] Detector pattern formation is paused.
                                [notApplicable] Detector pattern does not apply to the current setup.
                               *[collectingHits] Detector pattern is collecting hits.
                              }
                             *[hits] { $hitStage ->
                                [none] Detector screen is empty. No particles have arrived yet.
                                [few] Individual scattered hits appear. Total hits: { $hitCount }.
                                [emerging] { $patternKind ->
                                  [doubleSlitInterference] Hits begin forming faint bands.
                                  [singleSlitDiffraction] Bright-band pattern is absent.
                                  [whichPathDiffraction] Bright bands are gone.
                                 *[noBarrier] Evenly scattered hits appear across the detector screen.
                                } Total hits: { $hitCount }.
                                [developing] { $patternKind ->
                                  [doubleSlitInterference] Hits form evenly spaced bands.
                                  [singleSlitDiffraction] Bright-band pattern is absent.
                                  [whichPathDiffraction] Bright bands are gone.
                                 *[noBarrier] Evenly scattered hits collect across the detector screen.
                                } Total hits: { $hitCount }.
                               *[clear] { $patternKind ->
                                  [doubleSlitInterference] Hits form evenly spaced bands.
                                  [singleSlitDiffraction] Bright-band pattern is absent.
                                  [whichPathDiffraction] Bright bands are gone.
                                 *[noBarrier] Evenly scattered hits collect across the detector screen.
                                } Total hits: { $hitCount }.
                              }
                            }
                          }
    waveProgress:         >-
                          { $waveProgressStage ->
                            [sourceOff] Source is off, so no wave is traveling.
                            [travelingToSlits] { $waveDisplayMode ->
                              [amplitude] Solid wave moves toward slitted barrier.
                             *[electricField] Plane wave fronts move toward slitted barrier.
                              [realPart] Plane wave fronts move toward slitted barrier.
                              [imaginaryPart] Plane wave fronts move toward slitted barrier.
                            }
                            [atSlits] { $waveDisplayMode ->
                              [amplitude] { $patternKind ->
                                [doubleSlitInterference] Solid circular waves emerge from both slits and overlap.
                                [singleSlitDiffraction] Solid circular wave emerges from open slit only.
                                [whichPathDiffraction] As detection events occur, solid circular waves emerge from both slits one at a time
                                and do not interact.
                               *[noBarrier] Solid wave moves directly toward the detector screen.
                              }
                             *[electricField] { $patternKind ->
                                [doubleSlitInterference] Circular wave fronts emerge from both slits and overlap.
                                [singleSlitDiffraction] Circular wave fronts emerge from open slit only.
                                [whichPathDiffraction] As detection events occur, circular wave fronts emerge from both slits
                                one at a time and do not interact.
                               *[noBarrier] Plane wave fronts move directly toward the detector screen.
                              }
                              [realPart] { $patternKind ->
                                [doubleSlitInterference] Circular wave fronts emerge from both slits and overlap.
                                [singleSlitDiffraction] Circular wave fronts emerge from open slit only.
                                [whichPathDiffraction] As detection events occur, circular wave fronts emerge from both slits
                                one at a time and do not interact.
                               *[noBarrier] Plane wave fronts move directly toward the detector screen.
                              }
                              [imaginaryPart] { $patternKind ->
                                [doubleSlitInterference] Circular wave fronts emerge from both slits and overlap.
                                [singleSlitDiffraction] Circular wave fronts emerge from open slit only.
                                [whichPathDiffraction] As detection events occur, circular wave fronts emerge from both slits
                                one at a time and do not interact.
                               *[noBarrier] Plane wave fronts move directly toward the detector screen.
                              }
                            }
                            [interferingAfterSlits] { $waveDisplayMode ->
                              [amplitude] Overlapping solid circular waves add and cancel, and spread fan-shaped rays toward detector screen.
                             *[electricField] Overlapping circular wave fronts add and cancel, and spread checkered pattern toward detector screen.
                              [realPart] Overlapping circular wave fronts add and cancel, and spread checkered pattern toward detector screen.
                              [imaginaryPart] Overlapping circular wave fronts add and cancel, and spread checkered pattern toward detector screen.
                            }
                            [diffractingAfterSlits] { $waveDisplayMode ->
                              [amplitude] Solid circular wave spreads toward detector screen.
                             *[electricField] Circular wave fronts spread toward detector screen.
                              [realPart] Circular wave fronts spread toward detector screen.
                              [imaginaryPart] Circular wave fronts spread toward detector screen.
                            }
                            [whichPathAfterSlits] { $waveDisplayMode ->
                              [amplitude] Non-interacting solid circular waves spread toward detector screen.
                             *[electricField] Non-interacting circular wave fronts spread toward detector screen.
                              [realPart] Non-interacting circular wave fronts spread toward detector screen.
                              [imaginaryPart] Non-interacting circular wave fronts spread toward detector screen.
                            }
                            [directToScreen] { $waveDisplayMode ->
                              [amplitude] Solid wave moves directly toward the detector screen.
                             *[electricField] Plane wave fronts move directly toward the detector screen.
                              [realPart] Plane wave fronts move directly toward the detector screen.
                              [imaginaryPart] Plane wave fronts move directly toward the detector screen.
                            }
                           *[hittingScreen] { $waveDisplayMode ->
                              [amplitude] Solid wave has reached the detector screen.
                             *[electricField] Wave fronts have reached the detector screen.
                              [realPart] Wave fronts have reached the detector screen.
                              [imaginaryPart] Wave fronts have reached the detector screen.
                            }
                          }
    displayTools:         >-
                          { $displayMode ->
                            [graph] Graph view is active
                           *[screen] Detector screen view is active
                          }. Wave display mode is { $waveDisplayMode ->
                            [electricField] Electric Field
                            [realPart] Real Part
                            [imaginaryPart] Imaginary Part
                           *[amplitude] Amplitude
                          }. Screen brightness is { $brightness } percent. Stored snapshots: { $snapshotCount }.
                          Tools shown: { $tapeMeasure ->
                            [true] tape measure
                           *[false] no tape measure
                          }, { $stopwatch ->
                            [true] stopwatch
                           *[false] no stopwatch
                          }, { $timePlot ->
                            [true] time plot
                           *[false] no time plot
                          }, { $positionPlot ->
                            [true] position plot.
                           *[false] no position plot.
                          }
  highIntensityResponses:
    sourceStarted:            >-
                              { $isPlaying ->
                                [false] Source started. Sim is paused.
                               *[true] Source started on { $timeSpeed } speed.
                              }
    sourceRestarted:          Source restarted.
    advancingWave:            '{ $beamDescription }'
    sourceStopped:            >-
                              { $hasHitsData ->
                                [true] Source off. Hits data remain.
                               *[false] Source off.
                              }
    particleTypeChanged:      >-
                              { $sourceType ->
                                [photons] Photon
                                [electrons] Electron
                                [neutrons] Neutron
                               *[heliumAtoms] Helium atom
                              } experiment { $isEmitting ->
                                [true] in progress.
                               *[false] ready to start.
                              }
    detectionModeChanged:     >-
                              { $detectionMode ->
                                [averageIntensity] Average Intensity selected. The predicted pattern is shown continuously.
                               *[hits] Hits selected. Individual particle impacts build the pattern statistically.
                              }
    slitConfigurationChanged: >-
                              { $isEmitting ->
                                [true] { $sourceRestartedResponse }
                               *[false] { $slitSetting ->
                                  [bothOpen] In barrier, both slits open.
                                  [leftCovered] In barrier, top slit covered.
                                  [rightCovered] In barrier, bottom slit covered.
                                  [leftDetector] Detector added to top slit in barrier.
                                  [rightDetector] Detector added to bottom slit in barrier.
                                  [noBarrier] Barrier removed from experiment.
                                 *[bothDetectors] Detectors added to both slits in barrier.
                                }
                              }
    slitSeparationChanged:    >-
                              { $isEmitting ->
                                [true] { $sourceRestartedResponse }
                               *[false] Slit separation changed. Experiment changed. Previous hits cleared.
                              }
    wavelengthChanged:        >-
                              { $isEmitting ->
                                [true] { $sourceRestartedResponse }
                               *[false] Wavelength changed. Experiment changed. Previous hits cleared.
                              }
    speedChanged:             >-
                              { $isEmitting ->
                                [true] { $sourceRestartedResponse }
                               *[false] Particle speed changed.
                              }
    displayModeChanged:       >-
                              { $displayMode ->
                                [graph] Graph shown.
                               *[screen] Detector screen shown.
                              }
    brightnessChanged:        >-
                              Screen brightness { $brightnessTrend ->
                                [increased] increased.
                                [decreased] decreased.
                               *[unchanged] unchanged.
                              }
    waveDisplayChanged:       >-
                              Wave display changed to { $waveDisplayMode ->
                                [electricField] Electric Field.
                                [realPart] Real Part.
                                [imaginaryPart] Imaginary Part.
                               *[amplitude] Amplitude.
                              }
    toolChanged:              >-
                              { $tool ->
                                [tapeMeasure] Tape measure
                                [stopwatch] Stopwatch
                                [timePlot] Time plot
                               *[positionPlot] Position plot
                              } { $isVisible ->
                                [true] shown.
                               *[false] hidden.
                              }
    screenCleared:            >-
                              { $isRestarting ->
                                [true] { $sourceRestartedResponse }
                               *[false] Wave area cleared. Sim still paused.
                              }
    hitStageChanged:          >-
                              Hits pattern is now { $hitStage ->
                                [none] empty.
                                [few] showing individual scattered hits.
                                [emerging] { $patternKind ->
                                  [noBarrier] showing evenly scattered hits.
                                 *[doubleSlitInterference] forming faint bands.
                                  [singleSlitDiffraction] showing a broad central area.
                                  [whichPathDiffraction] showing a broad central area.
                                }
                                [developing] { $patternKind ->
                                  [noBarrier] showing evenly scattered hits.
                                 *[doubleSlitInterference] forming evenly spaced bands.
                                  [singleSlitDiffraction] showing a broad central area.
                                  [whichPathDiffraction] showing a broad central area.
                                }
                               *[clear] { $patternKind ->
                                  [noBarrier] showing evenly scattered hits.
                                 *[doubleSlitInterference] showing evenly spaced bands.
                                  [singleSlitDiffraction] showing a broad central area.
                                  [whichPathDiffraction] showing a broad central area.
                                }
                              }
    waveProgressChanged:      >-
                              { $waveProgressStage ->
                                [sourceOff] Source is off, so no wave is traveling.
                                [atSlits] { $waveDisplayMode ->
                                  [amplitude] { $patternKind ->
                                    [doubleSlitInterference] Solid circular waves emerge from both slits and overlap.
                                    [singleSlitDiffraction] Solid circular wave emerges from open slit only.
                                    [whichPathDiffraction] As detection events occur, solid circular waves emerge from both slits one at a time
                                    and do not interact.
                                   *[noBarrier] Solid wave moves directly toward the detector screen.
                                  }
                                 *[electricField] { $patternKind ->
                                    [doubleSlitInterference] Circular wave fronts emerge from both slits and overlap.
                                    [singleSlitDiffraction] Circular wave fronts emerge from open slit only.
                                    [whichPathDiffraction] As detection events occur, circular wave fronts emerge from both slits
                                    one at a time and do not interact.
                                   *[noBarrier] Plane wave fronts move directly toward the detector screen.
                                  }
                                  [realPart] { $patternKind ->
                                    [doubleSlitInterference] Circular wave fronts emerge from both slits and overlap.
                                    [singleSlitDiffraction] Circular wave fronts emerge from open slit only.
                                    [whichPathDiffraction] As detection events occur, circular wave fronts emerge from both slits
                                    one at a time and do not interact.
                                   *[noBarrier] Plane wave fronts move directly toward the detector screen.
                                  }
                                  [imaginaryPart] { $patternKind ->
                                    [doubleSlitInterference] Circular wave fronts emerge from both slits and overlap.
                                    [singleSlitDiffraction] Circular wave fronts emerge from open slit only.
                                    [whichPathDiffraction] As detection events occur, circular wave fronts emerge from both slits
                                    one at a time and do not interact.
                                   *[noBarrier] Plane wave fronts move directly toward the detector screen.
                                  }
                                }
                                [interferingAfterSlits] { $waveDisplayMode ->
                                  [amplitude] Overlapping solid circular waves add and cancel, and spread fan-shaped rays toward detector screen.
                                 *[electricField] Overlapping circular wave fronts add and cancel, and spread checkered pattern toward detector screen.
                                  [realPart] Overlapping circular wave fronts add and cancel, and spread checkered pattern toward detector screen.
                                  [imaginaryPart] Overlapping circular wave fronts add and cancel, and spread checkered pattern toward detector screen.
                                }
                                [diffractingAfterSlits] { $waveDisplayMode ->
                                  [amplitude] Solid circular wave spreads toward detector screen.
                                 *[electricField] Circular wave fronts spread toward detector screen.
                                  [realPart] Circular wave fronts spread toward detector screen.
                                  [imaginaryPart] Circular wave fronts spread toward detector screen.
                                }
                                [whichPathAfterSlits] { $waveDisplayMode ->
                                  [amplitude] Non-interacting solid circular waves spread toward detector screen.
                                 *[electricField] Non-interacting circular wave fronts spread toward detector screen.
                                  [realPart] Non-interacting circular wave fronts spread toward detector screen.
                                  [imaginaryPart] Non-interacting circular wave fronts spread toward detector screen.
                                }
                                [directToScreen] { $waveDisplayMode ->
                                  [amplitude] Solid wave moves directly toward the detector screen.
                                 *[electricField] Plane wave fronts move directly toward the detector screen.
                                  [realPart] Plane wave fronts move directly toward the detector screen.
                                  [imaginaryPart] Plane wave fronts move directly toward the detector screen.
                                }
                               *[hittingScreen] { $waveDisplayMode ->
                                  [amplitude] Solid wave reached the detector screen.
                                 *[electricField] Wave fronts reached the detector screen.
                                  [realPart] Wave fronts reached the detector screen.
                                  [imaginaryPart] Wave fronts reached the detector screen.
                                }
                              }
