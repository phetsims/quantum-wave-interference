# Accessibility strings
a11y:
  screenSummary:
    playArea:           >-
                        A double-slit experiment features a source emitting particles toward a barrier with two narrow slits.
                        Particles that pass through the slits land on a detector screen, building up a pattern.
                        You can adjust the source and slits, observe the resulting pattern, and save snapshots of the detector screen.
    controlArea:        >-
                        A ruler and stopwatch can be shown or hidden.
                        In hits mode, there are controls to play, pause, or adjust experiment speed.
                        Reset sim to start over.
    maxHitsReachedHint: Clear the detector screen to collect more hits.
    currentDetails:     >-
                        Currently, running a { $sourceType ->
                          [photons] photon
                          [electrons] electron
                          [neutrons] neutron
                         *[heliumAtoms] helium atom
                        } experiment.
                        The barrier has { $slitSetting ->
                          [bothOpen] both slits open
                          [leftCovered] the left slit covered
                          [rightCovered] the right slit covered
                          [leftDetector] a detector on the left slit
                          [rightDetector] a detector on the right slit
                         *[bothDetectors] detectors on both slits
                        } and the screen displays { $detectionMode ->
                          [averageIntensity] intensity
                         *[hits] hits
                        }.
                        The source is { $isEmitting ->
                          [true] on
                         *[false] off
                        }{ $isMaxHitsReached ->
                          [true] . Maximum hits reached for this scene.
                         *[false] .
                        }
    interactionHint:    >-
                        { $isEmitting ->
                          [true] Adjust the source or slits to make observations.
                         *[false] Turn on the { $sourceType ->
                            [photons] photon source
                            [electrons] electron source
                            [neutrons] neutron source
                           *[heliumAtoms] helium atom source
                          } to start experimenting.
                        }
  sourceHeading:               Source
  slitsHeading:                Slits
  detectorScreenHeading:       Detector Screen
  particleMass:
    accessibleParagraph: >-
                         { $sourceType ->
                           [electrons] Particle mass: 9.1 times 10 to the negative 31 kilograms.
                           [neutrons] Particle mass: 1.7 times 10 to the negative 27 kilograms.
                          *[heliumAtoms] Particle mass: 6.6 times 10 to the negative 27 kilograms.
                         }
  emitterButton:
    accessibleName:     >-
                        { $sourceType ->
                          [photons] Photon Source
                          [electrons] Electron Source
                          [neutrons] Neutron Source
                         *[heliumAtoms] Helium Atom Source
                        }
    accessibleHelpText: Turn the source on and off to start or stop the experiment.
  ruler:
    accessibleHelpText: Drag ruler up or down to align with features on the detector screen and graph.
  rulerCheckbox:
    accessibleHelpText:                 Show or hide a ruler to measure distances on the detector screen.
    accessibleContextResponseChecked:   Ruler shown.
    accessibleContextResponseUnchecked: Ruler hidden.
  stopwatchCheckbox:
    accessibleHelpText:                 Show or hide a stopwatch to time the experiment.
    accessibleContextResponseChecked:   Stopwatch shown.
    accessibleContextResponseUnchecked: Stopwatch hidden.
  slitSeparationSlider:
    accessibleHelpText: Adjust the distance between the centers of the two slits.
  screenDistanceSlider:
    accessibleHelpText: Adjust the distance from the barrier to the detector screen.
  wavelengthSlider:
    accessibleHelpText: Adjust wavelength of emitted photons.
  particleSpeedSlider:
    accessibleHelpText: Adjust speed of emitted particles.
  intensitySlider:
    accessibleHelpText: >-
                        Adjust how many { $sourceType ->
                          [photons] photons
                          [electrons] electrons
                          [neutrons] neutrons
                         *[heliumAtoms] helium atoms
                        } the source emits per unit time.
  brightnessSlider:
    accessibleName:     Screen Brightness
    accessibleHelpText: Adjust the brightness of the detector screen display.
  detectionModeRadioButtons:
    accessibleName:     Detection Mode
    accessibleHelpText: Choose how detections are displayed on the detector screen.
    intensityRadioButton:
      accessibleContextResponse: Detector screen now shows continuous intensity pattern.
    hitsRadioButton:
      accessibleContextResponse: Detector screen now shows individual hits.
  timeControlNode:
    simSpeedDescription: Choose Normal or Fast speed. In Hits mode, Fast collects hits more quickly for faster data collection.
  sceneRadioButtonGroup:
    accessibleName:     Experiment Type
    accessibleHelpText: Choose a particle type to switch to a different experiment setup.
    photonsRadioButton:
      accessibleContextResponse: Now experimenting with photons. Source, slits, and screen settings updated.
    electronsRadioButton:
      accessibleContextResponse: Now experimenting with electrons. Source, slits, and screen settings updated.
    neutronsRadioButton:
      accessibleContextResponse: Now experimenting with neutrons. Source, slits, and screen settings updated.
    heliumAtomsRadioButton:
      accessibleContextResponse: Now experimenting with helium atoms. Source, slits, and screen settings updated.
  slitSettingsComboBox:
    accessibleName:            Slit Configuration
    accessibleHelpText:        Choose a slit configuration to change which slits are open, covered, or monitored by a detector.
    accessibleContextResponse: >-
                               { $slitSetting ->
                                 [bothOpen] Both slits now open.
                                 [leftCovered] Left slit now covered.
                                 [rightCovered] Right slit now covered.
                                 [leftDetector] Left slit now monitored by a detector.
                                 [rightDetector] Right slit now monitored by a detector.
                                *[bothDetectors] Both slits now monitored by detectors.
                               }
  slitWidthMicrometersPattern: '{ $value } micrometers'
  slitView:
    accessibleParagraph: >-
                         Magnified view of the barrier with two vertical slits, each { $slitWidth } wide.
                         { $slitSetting ->
                           [bothOpen] Both slits are open.
                           [leftCovered] Left slit is covered.
                           [rightCovered] Right slit is covered.
                           [leftDetector] Left slit is monitored by a detector.
                           [rightDetector] Right slit is monitored by a detector.
                          *[bothDetectors] Both slits are monitored by detectors.
                         }
  zoomInButton:
    accessibleName: Zoom In
  zoomOutButton:
    accessibleName: Zoom Out
  graphAccordionBox:
    accessibleHelpTextCollapsed: Explore a graph of the detector screen pattern.
    accessibleParagraph:
      intensityOff:           The graph is empty. The source is off.
      intensity:              >-
                              The graph traces intensity versus position with a tall central peak and smaller
                              peaks on either side.
                              { $spatialDescription }
      intensitySingleSlit:    >-
                              The graph traces intensity versus position as a single broad peak centered on the
                              graph, tapering smoothly toward the edges. { $spatialDescription }
      hitsNone:               The histogram is empty. No particles have been counted yet.
      hitsFew:                >-
                              A few bars have appeared at scattered positions across the histogram.
      hitsEmerging:           >-
                              The histogram is growing. Some bars are becoming taller than others at repeated
                              positions across the graph.
      hitsDeveloping:         >-
                              Taller bars are appearing at regular intervals, with shorter bars between them.
                              { $spatialDescription }
      hitsClear:              >-
                              The histogram shows a tall central peak with repeating side peaks and lower bars
                              between them. { $spatialDescription }
      hitsSingleSlitEmerging: >-
                              The histogram is growing, with taller bars near the center and shorter bars toward
                              the edges.
      hitsSingleSlitClear:    >-
                              The histogram shows a broad central peak that tapers toward the edges.
                              { $spatialDescription }
    zoomButtonGroup:
      zoomLevelResponse: 'Zoom level { $level } of { $max }.'
  detectorScreen:
    accessibleParagraph:
      intensityOff:                   The detector screen is dark. The source is off.
      intensity:                      >-
                                      The detector screen shows alternating bright and dark vertical bands, brightest
                                      at the center and fainter toward the edges. { $spatialDescription }
      intensitySingleSlit:            >-
                                      The detector screen is brightest at the center and fades smoothly toward the edges
                                      in a broad band. { $spatialDescription }
      hitsNone:                       The detector screen is empty. No particles have arrived yet.
      hitsFew:                        >-
                                      A handful of particles are visible at scattered positions across the screen.
      hitsEmerging:                   >-
                                      More particles are appearing, and faint vertical stripes are becoming visible with
                                      gaps between them.
      hitsDeveloping:                 >-
                                      Individual impacts are gathering into distinct vertical bands, separated by regions
                                      with fewer particles.
                                      { $spatialDescription }
      hitsClear:                      >-
                                      Distinct vertical bands fill the screen, with dense stripes separated by nearly
                                      empty gaps. { $spatialDescription }
      hitsSingleSlitEmerging:         >-
                                      More particles are appearing in a broad region near the center of the screen, with
                                      fewer toward the edges.
      hitsSingleSlitClear:            >-
                                      Hits form a broad central band that tapers toward the edges.
                                      { $spatialDescription }
      snapshotHitsNone:               |-
                                      The detector screen is empty. { $hitCount ->
                                          [one] The detector screen shows a total of 1 hit.
                                         *[other] The detector screen shows a total of { $hitCount } hits.
                                      } No particles have arrived yet.
      snapshotHitsFew:                |-
                                      A handful of particles are visible at scattered positions across the screen. { $hitCount ->
                                          [one] The detector screen shows a total of 1 hit.
                                         *[other] The detector screen shows a total of { $hitCount } hits.
                                      }
      snapshotHitsEmerging:           |-
                                      More particles are appearing, and faint vertical stripes are becoming visible with gaps between them. { $hitCount ->
                                          [one] The detector screen shows a total of 1 hit.
                                         *[other] The detector screen shows a total of { $hitCount } hits.
                                      }
      snapshotHitsDeveloping:         |-
                                      Individual impacts are gathering into distinct vertical bands, separated by regions with fewer particles. { $hitCount ->
                                          [one] The detector screen shows a total of 1 hit.
                                         *[other] The detector screen shows a total of { $hitCount } hits.
                                      } { $spatialDescription }
      snapshotHitsClear:              |-
                                      Distinct vertical bands fill the screen, with dense stripes separated by nearly empty gaps. { $hitCount ->
                                          [one] The detector screen shows a total of 1 hit.
                                         *[other] The detector screen shows a total of { $hitCount } hits.
                                      } { $spatialDescription }
      snapshotHitsSingleSlitEmerging: |-
                                      More particles are appearing in a broad region near the center of the screen, with fewer toward the edges. { $hitCount ->
                                          [one] The detector screen shows a total of 1 hit.
                                         *[other] The detector screen shows a total of { $hitCount } hits.
                                      }
      snapshotHitsSingleSlitClear:    |-
                                      Hits form a broad central band that tapers toward the edges. { $hitCount ->
                                          [one] The detector screen shows a total of 1 hit.
                                         *[other] The detector screen shows a total of { $hitCount } hits.
                                      } { $spatialDescription }
    spatialDescription:
      rulerDoubleSlit:
        select_style:
          bands: >-
                 { $count } bands centered at 0 millimeters, spaced roughly { $spacing }
                 millimeters apart.
          peaks: >-
                 { $count } peaks centered at 0 millimeters, spaced roughly { $spacing }
                 millimeters apart.
      noRulerDoubleSlit:
        select_style:
          bands: >-
                 { $count } bands centered on the screen, spread symmetrically to either side.
          peaks: >-
                 { $count } peaks centered on the graph, spread symmetrically to either side.
      rulerSingleSlit:
        select_style:
          bands: >-
                 The central band spans roughly { $centralWidth } millimeters, centered at 0.
          peaks: >-
                 The central peak spans roughly { $centralWidth } millimeters, centered at 0.
      noRulerSingleSlit:
        select_style:
          bands: >-
                 A broad central band centered on the screen, tapering toward the edges.
          peaks: >-
                 A broad central peak, tapering toward the edges.
  detectorScreenButtons:
    clearScreen:
      accessibleName:            Clear Screen
      accessibleHelpText:        Clear all hits from the detector screen.
      accessibleContextResponse: Screen cleared.
    takeSnapshot:
      accessibleName:            Take Snapshot
      accessibleHelpText:        'Capture the current detector screen pattern as a snapshot. Up to { $maxSnapshots } snapshots can be saved.'
      accessibleContextResponse: 'Snapshot { $snapshotNumber } taken.'
    viewSnapshots:
      accessibleName:     View Snapshots
      accessibleHelpText: View and compare saved snapshots of the detector screen.
