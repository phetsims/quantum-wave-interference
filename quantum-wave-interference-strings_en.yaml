quantum-wave-interference.title:      'Quantum Wave Interference'
screen.experiment.name:               Experiment
photons:                              Photons
electrons:                            Electrons
neutrons:                             Neutrons
heliumAtoms:                          Helium Atoms
photonSource:                         Photon source
electronSource:                       Electron source
neutronSource:                        Neutron source
heliumAtomSource:                     Helium atom source
doubleSlit:                           Double slit
detectorScreen:                       Detector screen
intensity:                            Intensity
sourceIntensity:                      Source Intensity
particleSpeed:                        Particle Speed
emissionRate:                         Emission Rate
particleSpeedKmPerSecondPattern:      '{{value}} km/s'
max:                                  Max
slitSeparation:                       Slit Separation
screenDistance:                       Screen Distance
slitSettings:                         Slit Configuration
slitSeparationPattern:                '{{value}} mm'
slitSeparationMicrometerPattern:      '{{value}} μm'
screenDistancePattern:                '{{value}} m'
bothOpen:                             Both Open
leftCovered:                          Left Covered
rightCovered:                         Right Covered
leftDetector:                         Left Detector
rightDetector:                        Right Detector
hits:                                 Hits
hitsCountPattern:                     'Hits: {{count}}'
screenBrightness:                     Screen Brightness
intensityGraph:                       Intensity Graph
hitsGraph:                            Hits Graph
count:                                Count
snapshotNumberPattern:                'Snapshot {{number}}'
ruler:                                Ruler
stopwatch:                            Stopwatch
