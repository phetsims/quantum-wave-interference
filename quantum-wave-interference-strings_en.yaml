# Accessibility strings
a11y:
  screenSummary:
    playArea:           >-
                        A highly configurable three-part experimental setup includes a particle source emitter,
                        slitted barrier, and detector screen. When experiment is running, particles pass through
                        available slits in barrier to land on detector screen and build patterns. You can choose and
                        adjust source particles, configure slits in barrier, observe and take snapshots of resulting
                        patterns on detector screen.
    controlArea:        >-
                        Measurement tools can be added or removed to assist with data collection and analysis.
                        Reset sim to start over.
    maxHitsReachedHint: Clear detector screen to make more observations.
    currentDetails:     >-
                        Currently, { $isPlaying ->
                          [false] sim is paused. { $isMaxHitsReached ->
                            [true] Source is off. Max number of { $sourceType ->
                              [photons] photon
                              [electrons] electron
                              [neutrons] neutron
                             *[heliumAtoms] helium atom
                            } hits reached. Detector screen shows hits pattern.
                           *[false] { $isEmitting ->
                              [true] Source emits { $sourceType ->
                                [photons] photons
                                [electrons] electrons
                                [neutrons] neutrons
                               *[heliumAtoms] helium atoms
                              } directly at slitted barrier with { $slitSetting ->
                                [bothOpen] both slits open
                                [leftCovered] left slit covered
                                [rightCovered] right slit covered
                                [leftDetector] detector on left slit
                                [rightDetector] detector on right slit
                               *[bothDetectors] detectors on both slits
                              }. Detector screen shows { $detectionMode ->
                                [averageIntensity] intensity
                               *[hits] hits
                              } pattern.
                             *[false] Source is off. Detector screen is dark.
                            }
                          }
                         *[true] { $isMaxHitsReached ->
                            [true] source is off. Max number of { $sourceType ->
                              [photons] photon
                              [electrons] electron
                              [neutrons] neutron
                             *[heliumAtoms] helium atom
                            } hits reached. Detector screen shows hits pattern.
                           *[false] { $isEmitting ->
                              [true] source emits { $sourceType ->
                                [photons] photons
                                [electrons] electrons
                                [neutrons] neutrons
                               *[heliumAtoms] helium atoms
                              } directly at slitted barrier with { $slitSetting ->
                                [bothOpen] both slits open
                                [leftCovered] left slit covered
                                [rightCovered] right slit covered
                                [leftDetector] detector on left slit
                                [rightDetector] detector on right slit
                               *[bothDetectors] detectors on both slits
                              }. Detector screen shows { $detectionMode ->
                                [averageIntensity] intensity
                               *[hits] hits
                              } pattern.
                             *[false] source is off. Detector screen is dark.
                            }
                          }
                        }
    interactionHint:    >-
                        { $isEmitting ->
                          [true] Adjust source or slits and watch for changes on detector screen.
                         *[false] Turn on the { $sourceType ->
                            [photons] photon source emitter
                            [electrons] electron source emitter
                            [neutrons] neutron source emitter
                           *[heliumAtoms] helium atom source emitter
                          } to start experimenting.
                        }
  experimentSetupHeading:      Detector Screen and Experiment Setup
  sourceHeading:               Source Controls
  slitsHeading:                Slits and Screen Configuration
  detectorScreenHeading:       Detector Screen Controls
  experimentSetupDetails:
    leadingParagraph: 'Current experimental details:'
    sourceEmitter:    >-
                      { $sourceType ->
                        [photons] Photon Source Emitter
                        [electrons] Electron Source Emitter
                        [neutrons] Neutron Source Emitter
                       *[heliumAtoms] Helium Atom Source Emitter
                      } is { $isEmitting ->
                        [true] on.
                       *[false] off.
                      }
    detectionMode:    >-
                      Screen Detection set to { $detectionMode ->
                        [averageIntensity] Intensity Mode.
                       *[hits] Hits Mode.
                      }
    wavelength:       'Wavelength is { $wavelength }, and in { $color } zone.'
    particleSpeed:    'Particle Speed is { $speed }.'
    slitConfiguration: >-
                       { $slitSetting ->
                         [bothOpen] Both slits open in barrier.
                         [leftCovered] Left slit covered in barrier.
                         [rightCovered] Right slit covered in barrier.
                         [leftDetector] Detector on left slit in barrier.
                         [rightDetector] Detector on right slit in barrier.
                        *[bothDetectors] Detectors on both slits in barrier.
                       }
    slitSeparation:   'Slit Separation distance is { $distance }.'
    screenDistance:   'Distance from slitted barrier to detector screen is { $distance }.'
  particleMass:
    accessibleParagraph: >-
                         { $sourceType ->
                           [electrons] Electron particle mass is 9.1 times 10 to the negative 31 kilograms.
                           [neutrons] Neutron particle mass is 1.7 times 10 to the negative 27 kilograms.
                          *[heliumAtoms] Helium atom particle mass is 6.6 times 10 to the negative 27 kilograms.
                         }
  emitterButton:
    accessibleName:     >-
                        { $sourceType ->
                          [photons] Photon Source Emitter
                          [electrons] Electron Source Emitter
                          [neutrons] Neutron Source Emitter
                         *[heliumAtoms] Helium Atom Source Emitter
                        }
    accessibleHelpText: >-
                        { $isEmitting ->
                          [true] Turn source off to stop experiment.
                         *[false] Turn source on to start experiment.
                        }
    accessibleContextResponseOn: >-
                                 { $isPlaying ->
                                   [false] Experiment started. Sim paused.
                                  *[true] Experiment started.
                                 }
    accessibleContextResponseOff: Experiment stopped.
  ruler:
    accessibleHelpText: Move ruler up or down with keyboard shortcuts to take measurements.
  rulerCheckbox:
    accessibleHelpText:                 Use added ruler to measure distances across detector screen or graph.
    accessibleContextResponseChecked:   Ruler added near detector screen.
    accessibleContextResponseUnchecked: Ruler removed.
  stopwatchCheckbox:
    accessibleHelpText:                 Use added stopwatch to time experiment.
    accessibleContextResponseChecked:   Stopwatch added near detector screen.
    accessibleContextResponseUnchecked: Stopwatch removed.
  slitSeparationSlider:
    accessibleHelpText: Change distance between centers of slits in barrier in micrometers.
  screenDistanceSlider:
    accessibleHelpText: Change distance from slitted barrier to detector screen in meters.
  wavelengthSlider:
    accessibleHelpText:  Change wavelength of emitted photons in nanometers from shortest, violet, to longest, red.
    accessibleValue:     '{ $value }, { $color } zone'
    color:
      violet: violet
      blue:   blue
      indigo: indigo
      green:  green
      yellow: yellow
      orange: orange
      red:    red
  particleSpeedSlider:
    accessibleHelpText: Change speed of emitted particles in kilometers or meters per second.
  intensitySlider:
    accessibleHelpText: >-
                        Change number of { $sourceType ->
                          [photons] photons
                          [electrons] electrons
                          [neutrons] neutrons
                         *[heliumAtoms] helium atoms
                        } source emits per second.
    accessibleContextResponse: >-
                               { $change ->
                                 [more] More { $sourceType ->
                                   [photons] photons
                                   [electrons] electrons
                                   [neutrons] neutrons
                                  *[heliumAtoms] helium atoms
                                 }.
                                 [less] Less { $sourceType ->
                                   [photons] photons
                                   [electrons] electrons
                                   [neutrons] neutrons
                                  *[heliumAtoms] helium atoms
                                 }.
                                 [max] Max { $sourceType ->
                                   [photons] photons
                                   [electrons] electrons
                                   [neutrons] neutrons
                                  *[heliumAtoms] helium atoms
                                 }.
                                *[zero] Zero { $sourceType ->
                                   [photons] photons
                                   [electrons] electrons
                                   [neutrons] neutrons
                                  *[heliumAtoms] helium atoms
                                 }.
                               }
  brightnessSlider:
    accessibleName:     Screen Brightness
    accessibleHelpText: Adjust brightness to optimize visual analysis of pattern on detector screen.
  detectionModeRadioButtons:
    accessibleName:     Detection Mode Sensitivity
    accessibleHelpText: Choose continuous intensity pattern or individual hits pattern for particle detection.
    intensityRadioButton:
      accessibleContextResponse: >-
                                 { $isEmitting ->
                                   [true] Alternating bright and dark vertical bands on detector screen.
                                  *[false] Screen is dark. Start particle source.
                                 }
    hitsRadioButton:
      accessibleContextResponse: >-
                                 { $isEmitting ->
                                   [true] Individual hits increasing on detector screen.
                                  *[false] Screen is dark. Start particle source.
                                 }
  timeControlNode:
    simSpeedDescription: Choose Normal or Fast speed. In Hits mode, Fast collects hits more quickly for faster data collection.
  sceneRadioButtonGroup:
    accessibleName:     Particle Type
    accessibleHelpText: Change particle type for source emitter and change experiment setup.
    accessibleContextResponse: >-
                               { $isMaxHitsReached ->
                                 [true] { $sourceType ->
                                   [photons] Photon
                                   [electrons] Electron
                                   [neutrons] Neutron
                                  *[heliumAtoms] Helium atom
                                 } experiment at max hits. Clear detector screen to make more observations.
                                *[false] { $isEmitting ->
                                   [true] { $sourceType ->
                                     [photons] Photon
                                     [electrons] Electron
                                     [neutrons] Neutron
                                    *[heliumAtoms] Helium atom
                                   } experiment in progress. Configurations and detection screen updated.
                                  *[false] Source off. { $sourceType ->
                                     [photons] Photon
                                     [electrons] Electron
                                     [neutrons] Neutron
                                    *[heliumAtoms] Helium atom
                                   } experiment ready to start.
                                 }
                               }
    photonsRadioButton:
      accessibleContextResponse: Now experimenting with photons. Source, slits, and screen settings updated.
    electronsRadioButton:
      accessibleContextResponse: Now experimenting with electrons. Source, slits, and screen settings updated.
    neutronsRadioButton:
      accessibleContextResponse: Now experimenting with neutrons. Source, slits, and screen settings updated.
    heliumAtomsRadioButton:
      accessibleContextResponse: Now experimenting with helium atoms. Source, slits, and screen settings updated.
  slitSettingsComboBox:
    accessibleName:            Slit Configuration
    accessibleHelpText:        Choose slit configuration for barrier.
    accessibleContextResponse: >-
                               { $slitSetting ->
                                 [bothOpen] In barrier, both slits open.
                                 [leftCovered] In barrier, left slit covered.
                                 [rightCovered] In barrier, right slit covered.
                                 [leftDetector] Detector added to left slit in barrier.
                                 [rightDetector] Detector added to right slit in barrier.
                                *[bothDetectors] Detectors added to both slits in barrier.
                               }
  slitWidthMicrometersPattern: '{ $value } micrometers'
  slitView:
    accessibleParagraph: >-
                         Magnified view of the barrier with two vertical slits, each { $slitWidth } wide.
                         { $slitSetting ->
                           [bothOpen] Both slits are open.
                           [leftCovered] Left slit is covered.
                           [rightCovered] Right slit is covered.
                           [leftDetector] Left slit is monitored by a detector.
                           [rightDetector] Right slit is monitored by a detector.
                          *[bothDetectors] Both slits are monitored by detectors.
                         }
  zoomInButton:
    accessibleName: Zoom In
  zoomOutButton:
    accessibleName: Zoom Out
  graphAccordionBox:
    accessibleHelpTextCollapsed: Explore a graph of the detector screen pattern.
    accessibleContextResponseExpanded: >-
                                       { $detectionMode ->
                                         [averageIntensity] Dynamic graph of intensity pattern shown.
                                        *[hits] Dynamic histogram of hits data shown.
                                       }
    accessibleContextResponseCollapsed: >-
                                        { $detectionMode ->
                                          [averageIntensity] Intensity graph hidden.
                                         *[hits] Hits histogram hidden.
                                        }
    accessibleParagraph:
      intensityOff:           The graph is empty. The source is off.
      intensity:              >-
                              The graph traces intensity versus position with a tall central peak and smaller
                              peaks on either side.
                              { $spatialDescription }
      intensitySingleSlit:    >-
                              The graph traces intensity versus position as a single broad peak centered on the
                              graph, tapering smoothly toward the edges. { $spatialDescription }
      hitsNone:               The histogram is empty. No particles have been counted yet.
      hitsFew:                >-
                              A few bars have appeared at scattered positions across the histogram.
      hitsEmerging:           >-
                              The histogram is growing. Some bars are becoming taller than others at repeated
                              positions across the graph.
      hitsDeveloping:         >-
                              Taller bars are appearing at regular intervals, with shorter bars between them.
                              { $spatialDescription }
      hitsClear:              >-
                              The histogram shows a tall central peak with repeating side peaks and lower bars
                              between them. { $spatialDescription }
      hitsSingleSlitEmerging: >-
                              The histogram is growing, with taller bars near the center and shorter bars toward
                              the edges.
      hitsSingleSlitClear:    >-
                              The histogram shows a broad central peak that tapers toward the edges.
                              { $spatialDescription }
    zoomButtonGroup:
      zoomLevelResponse: 'Zoom level { $level } of { $max }.'
      zoomInAccessibleHelpText:  Zoom in to see more detail of graph pattern.
      zoomOutAccessibleHelpText: Zoom out to see more of graph pattern.
  detectorScreen:
    accessibleParagraph:
      intensityOff:                   Detector screen is dark.
      intensity:                      >-
                                      Detector screen shows alternating bright and dark vertical bands, brightest
                                      at the center and fainter toward the edges. { $spatialDescription }
      intensitySingleSlit:            >-
                                      Detector screen is brightest at the center and fades smoothly toward the edges
                                      in a broad band. { $spatialDescription }
      hitsNone:                       Detector screen is empty. No particles have arrived yet.
      hitsFew:                        >-
                                      A handful of particles are visible at scattered positions across the screen.
      hitsEmerging:                   >-
                                      More particles are appearing, and faint vertical stripes are becoming visible with
                                      gaps between them.
      hitsDeveloping:                 >-
                                      Individual impacts are gathering into distinct vertical bands, separated by regions
                                      with fewer particles.
                                      { $spatialDescription }
      hitsClear:                      >-
                                      Distinct vertical bands fill the screen, with dense stripes separated by nearly
                                      empty gaps. { $spatialDescription }
      hitsSingleSlitEmerging:         >-
                                      More particles are appearing in a broad region near the center of the screen, with
                                      fewer toward the edges.
      hitsSingleSlitClear:            >-
                                      Hits form a broad central band that tapers toward the edges.
                                      { $spatialDescription }
      snapshotHitsNone:               |-
                                      Detector screen is empty. { $hitCount ->
                                          [one] Detector screen shows a total of 1 hit.
                                         *[other] Detector screen shows a total of { $hitCount } hits.
                                      } No particles have arrived yet.
      snapshotHitsFew:                |-
                                      A handful of particles are visible at scattered positions across the screen. { $hitCount ->
                                          [one] Detector screen shows a total of 1 hit.
                                         *[other] Detector screen shows a total of { $hitCount } hits.
                                      }
      snapshotHitsEmerging:           |-
                                      More particles are appearing, and faint vertical stripes are becoming visible with gaps between them. { $hitCount ->
                                          [one] Detector screen shows a total of 1 hit.
                                         *[other] Detector screen shows a total of { $hitCount } hits.
                                      }
      snapshotHitsDeveloping:         |-
                                      Individual impacts are gathering into distinct vertical bands, separated by regions with fewer particles. { $hitCount ->
                                          [one] Detector screen shows a total of 1 hit.
                                         *[other] Detector screen shows a total of { $hitCount } hits.
                                      } { $spatialDescription }
      snapshotHitsClear:              |-
                                      Distinct vertical bands fill the screen, with dense stripes separated by nearly empty gaps. { $hitCount ->
                                          [one] Detector screen shows a total of 1 hit.
                                         *[other] Detector screen shows a total of { $hitCount } hits.
                                      } { $spatialDescription }
      snapshotHitsSingleSlitEmerging: |-
                                      More particles are appearing in a broad region near the center of the screen, with fewer toward the edges. { $hitCount ->
                                          [one] Detector screen shows a total of 1 hit.
                                         *[other] Detector screen shows a total of { $hitCount } hits.
                                      }
      snapshotHitsSingleSlitClear:    |-
                                      Hits form a broad central band that tapers toward the edges. { $hitCount ->
                                          [one] Detector screen shows a total of 1 hit.
                                         *[other] Detector screen shows a total of { $hitCount } hits.
                                      } { $spatialDescription }
    spatialDescription:
      rulerDoubleSlit:
        select_style:
          bands: >-
                 { $count } bands centered at 0 millimeters, spaced roughly { $spacing }
                 millimeters apart.
          peaks: >-
                 { $count } peaks centered at 0 millimeters, spaced roughly { $spacing }
                 millimeters apart.
      noRulerDoubleSlit:
        select_style:
          bands: >-
                 { $count } bands centered on the screen, spread symmetrically to either side.
          peaks: >-
                 { $count } peaks centered on the graph, spread symmetrically to either side.
      rulerSingleSlit:
        select_style:
          bands: >-
                 The central band spans roughly { $centralWidth } millimeters, centered at 0.
          peaks: >-
                 The central peak spans roughly { $centralWidth } millimeters, centered at 0.
      noRulerSingleSlit:
        select_style:
          bands: >-
                 A broad central band centered on the screen, tapering toward the edges.
          peaks: >-
                 A broad central peak, tapering toward the edges.
    zoomButtonGroup:
      zoomInAccessibleHelpText:  Zoom in to see more detail of detector screen pattern.
      zoomOutAccessibleHelpText: Zoom out to see more of detector screen pattern.
  detectorScreenButtons:
    clearScreen:
      accessibleName:            Clear Hits
      accessibleHelpText:        Clear hits pattern on detector screen.
      accessibleContextResponse: >-
                                 { $isEmitting ->
                                   [true] { $isPlaying ->
                                     [true] Hits pattern cleared. Hits detection restarted. Individual hits increasing
                                     on detector screen.
                                    *[false] Hits pattern cleared. Sim paused.
                                   }
                                  *[false] Hits pattern cleared. Screen dark.
                                 }
    takeSnapshot:
      accessibleName:            Take Snapshot
      accessibleHelpText:        'Capture and store up to { $maxSnapshots } snapshots of detector screen pattern.'
      accessibleContextResponse: 'Snapshot { $snapshotNumber } taken.'
    viewSnapshots:
      accessibleName:     View Snapshots
      accessibleHelpText: Open stored snapshots for comparative analysis or deletion.
